name: iOS Firebase Distribution

on:
  push:
    branches:
      - main

jobs:
  build-and-distribute:
    name: Build and Distribute iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Decode Apple Certificates and Provisioning Profiles
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Use macOS base64 -D for decoding
          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 -D > certificate.p12
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > profile.mobileprovision

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Setup Temporary Keychain
        env:
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD="temp_password_123"

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import certificate.p12 -k $KEYCHAIN_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

      - name: Generate ExportOptions.plist
        env:
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PROVISIONING_PROFILE_NAME=$(security cms -D -i profile.mobileprovision | xmllint --xpath "string(//key[text()='Name']/following-sibling::string)" -)

          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$IOS_BUNDLE_IDENTIFIER</key>
              <string>$PROVISIONING_PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build iOS IPA
        run: flutter build ipa --release --export-options-plist=ExportOptions.plist

      - name: Upload to Firebase App Distribution
        id: firebase_distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_IOS }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ secrets.FIREBASE_TESTER_GROUPS }}
          file: build/ios/ipa/*.ipa

      - name: Generate Summary
        run: |
          echo "### Firebase App Distribution Success :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "**Testing URI:** ${{ steps.firebase_distribution.outputs.TESTING_URI }}" >> $GITHUB_STEP_SUMMARY
          echo "**Firebase Console URI:** ${{ steps.firebase_distribution.outputs.FIREBASE_CONSOLE_URI }}" >> $GITHUB_STEP_SUMMARY
          echo "**Binary Download URI:** ${{ steps.firebase_distribution.outputs.BINARY_DOWNLOAD_URI }}" >> $GITHUB_STEP_SUMMARY
