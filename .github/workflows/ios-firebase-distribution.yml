name: iOS Firebase App Distribution

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-distribute:
    name: Build and Distribute iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Build iOS App
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          EXPORT_OPTIONS_PLIST: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ] || [ -z "$BUILD_PROVISION_PROFILE_BASE64" ] || [ -z "$EXPORT_OPTIONS_PLIST" ]; then
            echo "Apple certificates, profiles, or ExportOptions.plist are missing."
            echo "Building generic unsigned iOS app as a fallback. (Will not be uploaded to Firebase)"
            flutter build ios --release --no-codesign
            exit 0
          fi

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 -D -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 -D -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

          # Fix keychain partition list to prevent UI prompt hang during codesigning
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

          echo "Building signed iOS app for App Distribution."
          echo "$EXPORT_OPTIONS_PLIST" | base64 -D > ios/ExportOptions.plist
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        id: distribute
        if: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' && secrets.BUILD_PROVISION_PROFILE_BASE64 != '' }}
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: build/ios/ipa/*.ipa

      - name: Generate Summary
        env:
          HAS_CERTIFICATE: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}
        run: |
          echo "## 🍎 iOS Build & Distribution Complete!" >> $GITHUB_STEP_SUMMARY
          echo "- **App Name:** NyayaAssist" >> $GITHUB_STEP_SUMMARY
          if [ "$HAS_CERTIFICATE" = "true" ]; then
            echo "- **Firebase Console:** [View in Firebase Console](https://console.firebase.google.com/project/_/appdistribution/app/${{ secrets.FIREBASE_IOS_APP_ID }})" >> $GITHUB_STEP_SUMMARY
            echo "- **Testers:** Notified group 'testers'." >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Warning:** Built unsigned iOS app. Certificates are required to upload to Firebase. See the setup guide for instructions." >> $GITHUB_STEP_SUMMARY
          fi
