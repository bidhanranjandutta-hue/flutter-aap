name: Android Firebase App Distribution

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Analyze
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Setup Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        id: firebase_upload
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ secrets.FIREBASE_TESTER_GROUPS }}
          file: build/app/outputs/flutter-apk/app-release.apk

      - name: Publish Test Link to Summary
        run: |
          echo "### Firebase App Distribution 🎉" >> $GITHUB_STEP_SUMMARY
          echo "Successfully uploaded the APK!" >> $GITHUB_STEP_SUMMARY
          echo "- **Testing Link**: ${{ steps.firebase_upload.outputs.TESTING_URI }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Firebase Console**: ${{ steps.firebase_upload.outputs.FIREBASE_CONSOLE_URI }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Direct Download**: ${{ steps.firebase_upload.outputs.BINARY_DOWNLOAD_URI }}" >> $GITHUB_STEP_SUMMARY
